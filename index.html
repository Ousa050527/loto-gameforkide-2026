<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ឡូតូស្ដង់ដារ - រក្សាទុកលេខហៅរួច</title>
    <style>
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #1a2a6c; text-align: center; padding: 20px; color: white; }
        .container { max-width: 650px; margin: auto; background: #2c3e50; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* ផ្នែកមេហៅលេខ */
        .caller-box { background: #0f2027; padding: 20px; border-radius: 10px; border: 2px solid #feca57; margin-bottom: 20px; }
        #displayNum { font-size: 80px; font-weight: bold; color: #feca57; display: block; line-height: 1.2; }
        
        /* ផ្ទាំងបង្ហាញលេខដែលចេញរួច */
        .history-panel { background: #fff; color: #333; border-radius: 8px; padding: 15px; text-align: left; margin-top: 15px; min-height: 50px; }
        #historyList { font-size: 18px; color: #d35400; font-weight: bold; word-wrap: break-word; }

        .lotto-card { display: grid; grid-template-columns: repeat(9, 1fr); border: 2px solid #333; background: #fff; margin-top: 20px; color: #333; }
        .cell { aspect-ratio: 1/1; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .cell.empty { background: #eeeeee; }
        .cell.marked { background: #27ae60 !important; color: white; border-radius: 50%; transform: scale(0.8); }

        button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; width: 100%; }
        .btn-draw { background: #eb2f06; color: white; font-size: 24px; }
        .btn-new { background: #27ae60; color: white; }
        .btn-reset { background: #7f8c8d; color: white; font-size: 12px; width: auto; padding: 5px 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="caller-box">
        <h2 style="margin:0; font-size: 20px;">មេហៅលេខ</h2>
        <span id="displayNum">--</span>
        <button class="btn-draw" onclick="draw()">ចាប់លេខ</button>
        
        <div class="history-panel">
            <strong style="color:#1e3799">លេខចេញរួច៖</strong>
            <div id="historyList"></div>
        </div>
        <button class="btn-reset" onclick="resetDrawnNumbers()">Reset លេខចាស់ចោល</button>
    </div>

    <h3>សន្លឹកឡូតូ ៩x៩ (៥ លេខក្នុងមួយជួរ)</h3>
    <div id="cardGrid" class="lotto-card"></div>
    <button class="btn-new" onclick="createCard()">ប្តូរសន្លឹកបៀថ្មី</button>
</div>

<script>
    // ១. ទាញយកលេខដែលធ្លាប់ហៅរួចពី Memory (localStorage)
    let drawnNumbers = JSON.parse(localStorage.getItem('lotto_numbers_saved')) || [];

    function updateHistoryUI() {
        const historyDiv = document.getElementById('historyList');
        const display = document.getElementById('displayNum');
        
        if (drawnNumbers.length > 0) {
            display.innerText = drawnNumbers[drawnNumbers.length - 1]; // បង្ហាញលេខចុងក្រោយ
            historyDiv.innerText = drawnNumbers.join(', '); // បង្ហាញបញ្ជីលេខទាំងអស់
        } else {
            display.innerText = '--';
            historyDiv.innerText = 'មិនទាន់មានលេខចេញនៅឡើយ...';
        }
    }

    function draw() {
        if (drawnNumbers.length >= 90) return alert("អស់លេខហើយ!");
        
        let n;
        do {
            n = Math.floor(Math.random() * 90) + 1;
        } while (drawnNumbers.includes(n)); // បង្កើតលេខថ្មីរហូតដល់មិនស្ទួននឹងលេខចាស់

        drawnNumbers.push(n);
        
        // ២. រក្សាទុកចូលក្នុង Memory
        localStorage.setItem('lotto_numbers_saved', JSON.stringify(drawnNumbers));
        
        updateHistoryUI();
    }

    function resetDrawnNumbers() {
        if (confirm("តើអ្នកចង់លុបលេខដែលចេញរួចទាំងអស់មែនទេ?")) {
            drawnNumbers = [];
            localStorage.removeItem('lotto_numbers_saved');
            updateHistoryUI();
        }
    }

    // មុខងារបង្កើតសន្លឹកបៀ (រក្សាតាមលំនាំដេក ៥ ឈរ ៥ ដែលត្រឹមត្រូវ)
    function createCard() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        let matrix = Array.from({length: 9}, () => Array(9).fill(null));
        let colCounts = Array(9).fill(0);
        const colRanges = [[1,9],[10,19],[20,29],[30,39],[40,49],[50,59],[60,69],[70,79],[80,90]];

        function solve(rowIdx) {
            if (rowIdx === 9) return true;
            let possibleCols = [];
            for (let c = 0; c < 9; c++) if (colCounts[c] < 5) possibleCols.push(c);
            if (possibleCols.length < 5) return false;
            possibleCols.sort(() => Math.random() - 0.5);

            for (let i = 0; i <= possibleCols.length - 5; i++) {
                let selected = possibleCols.slice(i, i + 5);
                selected.forEach(c => {
                    let range = colRanges[c];
                    let num;
                    do { num = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
                    } while (matrix.some(row => row[c] === num));
                    matrix[rowIdx][c] = num;
                    colCounts[c]++;
                });
                if (solve(rowIdx + 1)) return true;
                selected.forEach(c => { matrix[rowIdx][c] = null; colCounts[c]--; });
            }
            return false;
        }

        solve(0);

        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell' + (matrix[r][c] === null ? ' empty' : '');
                cell.innerText = matrix[r][c] || '';
                if (matrix[r][c]) {
                    cell.onclick = function() { this.classList.toggle('marked'); };
                }
                grid.appendChild(cell);
            }
        }
    }

    // ដំណើរការដំបូង
    updateHistoryUI();
    createCard();
</script>

</body>
</html>
