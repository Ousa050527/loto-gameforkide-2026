<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>ឡូតូស្ដង់ដារ - មិនជាន់លេខគ្នា</title>
    <style>
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #1a2a6c; text-align: center; padding: 20px; color: white; }
        .container { max-width: 650px; margin: auto; background: #2c3e50; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* មេហៅលេខ */
        .caller-box { background: #0f2027; padding: 20px; border-radius: 10px; border: 2px solid #feca57; margin-bottom: 20px; }
        #currentNum { font-size: 80px; font-weight: bold; color: #feca57; display: block; line-height: 1.2; }
        
        /* បញ្ជីលេខចេញរួច */
        .history-panel { background: #fff; color: #333; border-radius: 8px; padding: 15px; text-align: left; margin-top: 15px; }
        #historyList { font-size: 16px; color: #d35400; font-weight: bold; word-wrap: break-word; min-height: 25px; }

        button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; width: 100%; }
        .btn-draw { background: #eb2f06; color: white; font-size: 24px; }
        .btn-new { background: #27ae60; color: white; }
        .btn-reset { background: #7f8c8d; color: white; font-size: 12px; margin-top: 10px; width: auto; padding: 5px 15px; }

        /* តារាងសន្លឹកបៀ */
        .lotto-card { display: grid; grid-template-columns: repeat(9, 1fr); border: 2px solid #fff; background: #fff; margin-top: 20px; color: #333; }
        .cell { aspect-ratio: 1/1; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cell.empty { background: #e0e0e0; }
        .cell:hover:not(.empty) { background: #f1c40f; }
        .cell.marked { background: #27ae60 !important; color: white; border-radius: 50%; transform: scale(0.8); }
    </style>
</head>
<body>

<div class="container">
    <div class="caller-box">
        <div style="font-size: 20px;">មេហៅលេខ</div>
        <span id="currentNum">--</span>
        <button class="btn-draw" onclick="drawNumber()">ចាប់លេខ</button>
        
        <div class="history-panel">
            <strong style="color:#1e3799">លេខចេញរួច៖</strong>
            <div id="historyList"></div>
        </div>
        <button class="btn-reset" onclick="clearHistory()">Reset លេខចាស់ចោល</button>
    </div>

    <div id="cardGrid" class="lotto-card"></div>
    <button class="btn-new" onclick="createNewCard()">ប្តូរសន្លឹកបៀថ្មី</button>
</div>

<script>
    // ១. រក្សាទុកប្រវត្តិក្នុង LocalStorage
    let drawnNumbers = JSON.parse(localStorage.getItem('lotto_safe_log')) || [];

    const colRanges = [
        [1, 9], [10, 19], [20, 29], [30, 39], [40, 49],
        [50, 59], [60, 69], [70, 79], [80, 90]
    ];

    function updateUI() {
        const historyDiv = document.getElementById('historyList');
        const currentDisplay = document.getElementById('currentNum');
        if (drawnNumbers.length > 0) {
            currentDisplay.innerText = drawnNumbers[drawnNumbers.length - 1];
            historyDiv.innerText = drawnNumbers.join(', ');
        } else {
            currentDisplay.innerText = '--';
            historyDiv.innerText = 'មិនទាន់មានលេខចេញ...';
        }
    }

    function drawNumber() {
        if (drawnNumbers.length >= 90) return alert("អស់លេខហើយ!");
        let n;
        do { n = Math.floor(Math.random() * 90) + 1; } while (drawnNumbers.includes(n));
        drawnNumbers.push(n);
        localStorage.setItem('lotto_safe_log', JSON.stringify(drawnNumbers));
        updateUI();
    }

    function clearHistory() {
        if (confirm("លុបប្រវត្តិលេខចេញរួចមែនទេ?")) {
            drawnNumbers = [];
            localStorage.removeItem('lotto_safe_log');
            updateUI();
        }
    }

    // ២. បង្កើតសន្លឹកបៀដោយត្រួតពិនិត្យ "លេខជាន់គ្នា" ក្នុងជួរឈរ
    function createNewCard() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        let matrix = Array.from({length: 9}, () => Array(9).fill(null));

        // បង្កើតតារាងដែលធានាថាជួរឈរនីមួយៗមិនមានលេខជាន់គ្នា
        for (let c = 0; c < 9; c++) {
            let range = colRanges[c];
            let availableNumbers = [];
            // បង្កើតបញ្ជីលេខដែលអាចប្រើបានក្នុងជួរឈរនេះ
            for (let i = range[0]; i <= range[1]; i++) availableNumbers.push(i);
            
            // លាយបញ្ជីលេខឱ្យចៃដន្យ
            availableNumbers.sort(() => Math.random() - 0.5);

            // ជ្រើសរើស ៥ ជួរដេកដោយចៃដន្យសម្រាប់ជួរឈរនេះ
            let rowsToFill = [0, 1, 2, 3, 4, 5, 6, 7, 8].sort(() => Math.random() - 0.5).slice(0, 5);
            
            rowsToFill.forEach((r, index) => {
                // យកលេខពីបញ្ជីដែលបានលាយហើយ មកដាក់តាមលំដាប់ ធានាថាមិនជាន់គ្នា
                matrix[r][c] = availableNumbers[index];
            });
        }

        // ៣. បង្ហាញក្នុង HTML
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                if (matrix[r][c] !== null) {
                    cell.innerText = matrix[r][c];
                    cell.onclick = function() { this.classList.toggle('marked'); };
                } else {
                    cell.classList.add('empty');
                }
                grid.appendChild(cell);
            }
        }
    }

    updateUI();
    createNewCard();
</script>

</body>
</html>
